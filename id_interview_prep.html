<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID最終面接対策 — 統合flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-elevated: #161411;
    --bg-card: #1c1a16;
    --bg-card-hover: #221f1a;
    --border: #2d2822;
    --border-strong: #3d372e;
    --text: #ebe4d5;
    --text-muted: #9a9285;
    --text-dim: #6b6459;
    --accent: #d4a574;
    --accent-soft: #8c7a5c;
    --accent-bg: rgba(212, 165, 116, 0.08);
    --ink: #d4a574;
    --serif: 'Noto Serif JP', serif;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', 'Noto Serif JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--serif);
    background: var(--bg);
    color: var(--text);
    font-weight: 400;
    line-height: 1.75;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top left, rgba(212, 165, 116, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(212, 165, 116, 0.03) 0%, transparent 50%);
  }

  #root { min-height: 100vh; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 48px 0 36px;
    margin-bottom: 32px;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 80px;
    height: 1px;
    background: var(--accent);
  }
  .kicker {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .title {
    font-family: var(--serif);
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .title-sub {
    font-size: 20px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .meta {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .meta span strong {
    color: var(--text);
    font-weight: 500;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }
  .search-bar {
    display: flex;
    align-items: center;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0 16px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within {
    border-color: var(--accent-soft);
  }
  .search-bar svg {
    flex-shrink: 0;
    color: var(--text-dim);
  }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--serif);
    font-size: 15px;
    padding: 14px 12px;
    letter-spacing: 0.02em;
  }
  .search-bar input::placeholder {
    color: var(--text-dim);
  }
  .search-clear {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .search-clear:hover {
    color: var(--text);
    background: var(--bg-card);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
    margin-bottom: 32px;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-family: var(--serif);
    font-size: 14px;
    padding: 12px 18px;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    letter-spacing: 0.02em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab-count {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 6px;
    vertical-align: 1px;
  }
  .tab.active .tab-count { color: var(--accent-soft); }

  /* Section header */
  .section-intro {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.8;
    margin-bottom: 24px;
    padding: 20px 24px;
    background: var(--bg-elevated);
    border-left: 2px solid var(--accent-soft);
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-strong); }
  .card.completed {
    border-left: 2px solid var(--accent-soft);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 22px 26px;
    cursor: pointer;
    user-select: none;
  }
  .card-index {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    padding-top: 4px;
    min-width: 42px;
  }
  .card-q {
    flex: 1;
    font-family: var(--serif);
    font-size: 17px;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.55;
  }
  .card-q .q-label {
    color: var(--accent);
    font-family: var(--mono);
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-right: 10px;
    vertical-align: 2px;
  }
  .check-btn {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 2px;
  }
  .check-btn:hover { border-color: var(--accent-soft); }
  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check-btn.checked svg { color: var(--bg); }
  .check-btn svg { width: 12px; height: 12px; color: transparent; transition: color 0.2s; }

  .toggle-icon {
    flex-shrink: 0;
    color: var(--text-dim);
    padding-top: 4px;
    transition: transform 0.2s;
  }
  .card.open .toggle-icon { transform: rotate(90deg); color: var(--accent); }

  .card-body {
    padding: 0 26px 28px 84px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .card.open .card-body {
    max-height: 6000px;
    padding: 0 26px 32px 84px;
  }

  .body-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 20px 0 10px;
    font-weight: 600;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .body-label:first-child { margin-top: 4px; }

  .answer {
    font-family: var(--serif);
    font-size: 15px;
    line-height: 1.95;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .answer p { margin-bottom: 14px; }
  .answer p:last-child { margin-bottom: 0; }
  .answer strong { color: var(--accent); font-weight: 600; }

  .design-note {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.75;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .design-note ul { list-style: none; }
  .design-note li {
    padding-left: 18px;
    position: relative;
    margin-bottom: 6px;
  }
  .design-note li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--accent-soft);
  }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 9px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.priority-high {
    color: var(--accent);
    border-color: var(--accent-soft);
  }
  .tag.priority-mid {
    color: #b89968;
    border-color: #5a4d36;
  }
  .tag.priority-low {
    color: var(--text-dim);
  }

  .quote-block {
    border-left: 2px solid var(--accent-soft);
    padding: 10px 18px;
    margin: 14px 0;
    background: var(--accent-bg);
    font-style: italic;
    color: var(--text);
    font-size: 14px;
    line-height: 1.8;
  }

  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0 14px;
  }
  .pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Progress bar */
  .progress {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: 16px 0;
    z-index: 50;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .progress-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .progress-label strong {
    color: var(--accent);
    font-weight: 600;
  }
  .progress-track {
    flex: 1;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: var(--accent);
    transition: width 0.4s;
  }

  /* Footer */
  .footer {
    margin-top: 80px;
    padding: 32px 0;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  /* Day-of section styling */
  .dayof-card {
    background: var(--bg-elevated);
    padding: 24px 28px;
    margin-bottom: 16px;
    border-left: 2px solid var(--accent);
  }
  .dayof-title {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--accent);
  }
  .dayof-list {
    list-style: none;
    font-size: 14px;
    line-height: 1.9;
  }
  .dayof-list li {
    padding-left: 22px;
    position: relative;
    margin-bottom: 5px;
  }
  .dayof-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent-soft);
    font-family: var(--mono);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-family: var(--serif);
  }
  .empty .kicker {
    display: inline-block;
    margin-bottom: 16px;
  }

  @media (max-width: 700px) {
    .container { padding: 0 20px; }
    .title { font-size: 32px; }
    .title-sub { font-size: 16px; }
    .meta { flex-direction: column; gap: 6px; }
    .card-head { padding: 18px 18px; gap: 12px; }
    .card-index { min-width: 36px; font-size: 10px; }
    .card-q { font-size: 15px; }
    .card-body, .card.open .card-body { padding-left: 18px; padding-right: 18px; }
    .tab { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

// ============ COMPONENTS ============
function App() {
  const [activeTab, setActiveTab] = useState('core');
  const [searchQuery, setSearchQuery] = useState('');
  const [openCards, setOpenCards] = useState({});
  const [completed, setCompleted] = useState({});

  const toggleCard = (id) => {
    setOpenCards(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const toggleComplete = (id, e) => {
    e.stopPropagation();
    setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const filteredSections = useMemo(() => {
    if (!searchQuery) return SECTIONS;
    const q = searchQuery.toLowerCase();
    return SECTIONS.map(sec => ({
      ...sec,
      cards: sec.cards.filter(c =>
        c.q.toLowerCase().includes(q) ||
        (c.answer || []).some(a => a.toLowerCase().includes(q)) ||
        (c.tags || []).some(t => t.toLowerCase().includes(q))
      )
    })).filter(sec => sec.cards.length > 0);
  }, [searchQuery]);

  const currentSection = searchQuery
    ? filteredSections
    : SECTIONS.filter(s => s.id === activeTab);

  const totalCards = SECTIONS.reduce((sum, s) => sum + s.cards.length, 0);
  const completedCount = Object.values(completed).filter(Boolean).length;
  const progressPct = totalCards > 0 ? (completedCount / totalCards) * 100 : 0;

  return (
    <>
      <div className="container">
        <div className="header">
          <div className="kicker">Interview Preparation · Final Stage</div>
          <h1 className="title">IDホールディングス 最終面接</h1>
          <div className="title-sub">対策統合版 ·  埼玉大学経済学部 根本</div>
          <div className="meta">
            <span><strong>{SECTIONS.length}</strong> セクション</span>
            <span><strong>{totalCards}</strong> 質問・回答</span>
            <span>エージェント対策・体験記<strong>2021/2026</strong>・IR情報 統合</span>
          </div>
        </div>
      </div>

      <div className="progress">
        <div className="container">
          <div className="progress-inner">
            <div className="progress-label">
              進捗 <strong>{completedCount} / {totalCards}</strong>
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${progressPct}%` }}></div>
            </div>
            <div className="progress-label">
              <strong>{Math.round(progressPct)}%</strong>
            </div>
          </div>
        </div>
      </div>

      <div className="container">
        <div className="controls">
          <div className="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              placeholder="質問を検索..."
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
            />
            {searchQuery && (
              <button className="search-clear" onClick={() => setSearchQuery('')}>
                CLEAR
              </button>
            )}
          </div>
        </div>

        {!searchQuery && (
          <div className="tabs">
            {SECTIONS.map(sec => (
              <button
                key={sec.id}
                className={`tab ${activeTab === sec.id ? 'active' : ''}`}
                onClick={() => setActiveTab(sec.id)}
              >
                {sec.label}
                <span className="tab-count">{sec.cards.length}</span>
              </button>
            ))}
          </div>
        )}

        {currentSection.length === 0 && searchQuery && (
          <div className="empty">
            <div className="kicker">No results</div>
            <div>「{searchQuery}」に一致する質問が見つかりませんでした。</div>
          </div>
        )}

        {currentSection.map(sec => (
          <div key={sec.id}>
            {!searchQuery && <div className="section-intro">{sec.intro}</div>}
            {searchQuery && (
              <div className="section-intro" style={{ borderLeftColor: 'var(--accent)' }}>
                <span style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.15em', color: 'var(--accent)' }}>
                  {sec.label}セクション
                </span>
                <span style={{ marginLeft: 12, color: 'var(--text-dim)' }}>
                  {sec.cards.length}件ヒット
                </span>
              </div>
            )}

            {sec.cards.map((card, idx) => (
              <div
                key={card.id}
                className={`card ${openCards[card.id] ? 'open' : ''} ${completed[card.id] ? 'completed' : ''}`}
              >
                <div className="card-head" onClick={() => toggleCard(card.id)}>
                  <div className="card-index">
                    {String(idx + 1).padStart(2, '0')}
                  </div>
                  <div className="card-q">
                    <span className="q-label">Q</span>
                    {card.q}
                    <div className="tag-row">
                      {card.priority && (
                        <span className={`tag priority-${card.priority}`}>
                          {card.priority === 'high' ? '★ 最重要' : card.priority === 'mid' ? '要準備' : '備え'}
                        </span>
                      )}
                      {card.prob && <span className="tag">{card.prob}</span>}
                      {(card.tags || []).map((t, i) => <span key={i} className="tag">{t}</span>)}
                    </div>
                  </div>
                  <button
                    className={`check-btn ${completed[card.id] ? 'checked' : ''}`}
                    onClick={(e) => toggleComplete(card.id, e)}
                    title="練習済み"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </button>
                  <svg className="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                  </svg>
                </div>

                <div className="card-body">
                  <div className="body-label">回答</div>
                  <div className="answer">
                    {card.answer.map((p, i) => <p key={i}>{p}</p>)}
                  </div>

                  {card.design && (
                    <>
                      <div className="body-label">設計意図・注意点</div>
                      <div className="design-note">
                        <ul>
                          {card.design.map((d, i) => <li key={i}>{d}</li>)}
                        </ul>
                      </div>
                    </>
                  )}
                </div>
              </div>
            ))}
          </div>
        ))}

        <div className="footer">
          <span>ID Holdings · Final Interview · v1.0</span>
          <span>Prepared for 根本あおば · 埼玉大学経済学部</span>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
